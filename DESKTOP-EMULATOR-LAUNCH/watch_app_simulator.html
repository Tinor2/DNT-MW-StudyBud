<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualia Watch App Simulator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; font-family: system-ui, sans-serif; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; }
  .root { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .device-wrap { position: relative; width: 340px; height: 340px; }
  .clip-circle { width: 340px; height: 340px; border-radius: 50%; overflow: hidden; border: 3px solid #ccc; background: #0a0a0a; position: relative; }
  .view-track { display: flex; width: 680px; height: 340px; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .view { width: 340px; height: 340px; flex-shrink: 0; position: relative; overflow: hidden; }

  /* ── Watch face ── */
  .watch-bg { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .watch-time { font-size: 58px; font-weight: 500; color: #fff; letter-spacing: -2px; line-height: 1; }
  .watch-date { font-size: 14px; color: rgba(255,255,255,0.45); letter-spacing: 1px; }
  .watch-hint { position: absolute; bottom: 62px; font-size: 12px; color: rgba(255,255,255,0.3); }

  /* ── Library ── */
  .library-bg { background: #111; display: flex; flex-direction: column; }
  .lib-header { padding: 28px 28px 12px; flex-shrink: 0; }
  .lib-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }
  .lib-list { flex: 1; overflow: hidden; position: relative; padding: 0 20px; }
  .lib-item { display: flex; align-items: center; gap: 14px; padding: 11px 14px; border-radius: 14px; transition: background 0.15s; margin-bottom: 4px; }
  .lib-item.selected { background: rgba(255,255,255,0.1); }
  .app-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .app-label { font-size: 15px; color: rgba(255,255,255,0.6); font-weight: 400; }
  .app-label.selected { color: #fff; font-weight: 500; }
  .select-arrow { margin-left: auto; font-size: 13px; color: rgba(255,255,255,0.3); }
  .lib-item.selected .select-arrow { color: rgba(255,255,255,0.6); }

  /* ── Active app view ── */
  .active-app-view { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
  .active-icon-large { width: 72px; height: 72px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 14px; }
  .active-app-name { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 6px; }
  .active-app-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 28px; }
  .active-app-content { width: 100%; }

  /* ── Controls ── */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 340px; }
  .ctrl-label { font-size: 12px; color: #666; text-align: center; }
  .dial-row { display: flex; align-items: center; gap: 14px; width: 100%; }
  .dial-slider { flex: 1; }
  .btn-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
  .hw-btn { padding: 8px 24px; font-size: 13px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; cursor: pointer; }
  .hw-btn:active { transform: scale(0.97); background: #eee; }
  .view-badge { display: flex; gap: 6px; align-items: center; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; }
  .badge-active { background: #fff; border: 1px solid #999; color: #111; }
  .badge-dim { background: #eee; border: 1px solid #ddd; color: #888; }
  .divider { font-size: 11px; color: #aaa; }

  /* ── App content: To-do ── */
  .todo-list { width: 100%; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
  .todo-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0; }
  .todo-check.done { background: #4ade80; border-color: #4ade80; }
  .todo-text { font-size: 12px; color: rgba(255,255,255,0.55); }
  .todo-text.done { text-decoration: line-through; color: rgba(255,255,255,0.25); }

  /* ── App content: Timer ── */
  .timer-display { font-size: 40px; font-weight: 500; color: #fff; letter-spacing: -1px; }
  .timer-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }

  /* ── App content: Counter ── */
  .counter-num { font-size: 64px; font-weight: 500; color: #fff; letter-spacing: -3px; line-height: 1; }
  .counter-label { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px; }
</style>
</head>
<body>
<div class="root">

  <!-- ── Device ── -->
  <div class="device-wrap">
    <div class="clip-circle">
      <div class="view-track" id="track">

        <!-- View 0: Watch face / Active app -->
        <div class="view watch-bg" id="view-watch">
          <div class="watch-time" id="clock-time">--:--</div>
          <div class="watch-date" id="clock-date">---</div>
          <div class="watch-hint">← dial to browse apps</div>
        </div>

        <!-- View 1: App library -->
        <div class="view library-bg" id="view-library">
          <div class="lib-header">
            <div class="lib-title">Apps</div>
          </div>
          <div class="lib-list" id="lib-list"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">
    <div class="view-badge">
      <span class="badge" id="badge-watch">Watch face</span>
      <span class="divider">→</span>
      <span class="badge" id="badge-lib">App library</span>
    </div>
    <div class="ctrl-label">Dial — scroll between views / scroll app list</div>
    <div class="dial-row">
      <i class="ti ti-rotate-clockwise" style="font-size:16px;color:#aaa" aria-hidden="true"></i>
      <input type="range" min="0" max="100" value="0" step="1" id="dial" class="dial-slider">
      <i class="ti ti-rotate-clockwise" style="font-size:16px;color:#aaa;transform:scaleX(-1)" aria-hidden="true"></i>
    </div>
    <div class="ctrl-label">Button — select app / context action / go back</div>
    <div class="btn-row">
      <button class="hw-btn" id="btn-select">⬤ Press button</button>
    </div>
  </div>

</div>

<script>
  // ── App definitions ──────────────────────────────────────────────
  // Add or edit apps here. Each app needs:
  //   name: string
  //   sub:  string (subtitle shown in library + app header)
  //   color: hex string (used for icon background tint)
  //   emoji: string (icon)
  //   view: string (matches a case in buildAppView)
  const apps = [
    { name: "To-do",   sub: "3 tasks today",  color: "#7C3AED", emoji: "✓",  view: "todo"    },
    { name: "Timer",   sub: "Countdown",       color: "#0891B2", emoji: "⏱", view: "timer"   },
    { name: "Counter", sub: "Click counter",   color: "#059669", emoji: "＋", view: "counter" },
    { name: "Clock",   sub: "World time",      color: "#D97706", emoji: "🕐", view: "clock2"  },
    { name: "Notes",   sub: "Quick notes",     color: "#DC2626", emoji: "✎", view: "notes"   },
  ];

  // ── State ────────────────────────────────────────────────────────
  const DIAL_SWITCH = 30;   // dial value threshold to trigger library slide
  let currentView  = "watch";   // "watch" | "library" | "app"
  let selectedApp  = null;
  let libIndex     = 0;
  let prevDialVal  = 0;
  let timerSecs    = 300;
  let timerRunning = false;
  let counterVal   = 0;
  let timerInterval = null;

  // ── DOM refs ─────────────────────────────────────────────────────
  const track     = document.getElementById("track");
  const dial      = document.getElementById("dial");
  const btnSelect = document.getElementById("btn-select");
  const libList   = document.getElementById("lib-list");
  const badgeWatch = document.getElementById("badge-watch");
  const badgeLib   = document.getElementById("badge-lib");

  // ── Helpers ──────────────────────────────────────────────────────
  function slideTo(x) {
    track.style.transform = `translateX(-${x}px)`;
  }

  function updateBadges() {
    if (currentView === "watch" || currentView === "app") {
      badgeWatch.className = "badge badge-active";
      badgeLib.className   = "badge badge-dim";
    } else {
      badgeWatch.className = "badge badge-dim";
      badgeLib.className   = "badge badge-active";
    }
  }

  function getTimeOffset(offsetHours) {
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset() * 60000;
    const t   = new Date(utc + 3600000 * offsetHours);
    return t.toTimeString().slice(0, 5);
  }

  function updateClock() {
    const el = document.getElementById("clock-time");
    const de = document.getElementById("clock-date");
    if (!el || !de) return;
    const now    = new Date();
    const h      = now.getHours().toString().padStart(2, "0");
    const m      = now.getMinutes().toString().padStart(2, "0");
    el.textContent = `${h}:${m}`;
    const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    de.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
  }

  // ── Library ──────────────────────────────────────────────────────
  function buildLibList() {
    libList.innerHTML = "";
    apps.forEach((app, i) => {
      const item = document.createElement("div");
      item.className = "lib-item" + (i === libIndex ? " selected" : "");
      item.innerHTML = `
        <div class="app-icon" style="background:${app.color}22;color:${app.color}">${app.emoji}</div>
        <div>
          <div class="app-label${i === libIndex ? " selected" : ""}">${app.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3)">${app.sub}</div>
        </div>
        <span class="select-arrow">›</span>
      `;
      libList.appendChild(item);
    });
  }

  // ── App view builder ─────────────────────────────────────────────
  // To add a new app:
  //   1. Add an entry to the apps array above
  //   2. Add a matching case here that returns an HTML string
  function buildAppContent(app) {
    switch (app.view) {
      case "todo":
        return `<div class="todo-list">
          ${[["Buy groceries",true],["Call dentist",false],["Finish project",false],["Read book",true]]
            .map(([t, d]) => `
            <div class="todo-item">
              <div class="todo-check${d ? " done" : ""}"></div>
              <div class="todo-text${d ? " done" : ""}">${t}</div>
            </div>`).join("")}
        </div>`;

      case "timer":
        timerRunning = false;
        timerSecs = 300;
        return `<div style="text-align:center">
          <div class="timer-display" id="timer-disp">05:00</div>
          <div class="timer-sub">press button to start / stop</div>
        </div>`;

      case "counter":
        counterVal = 0;
        return `<div style="text-align:center">
          <div class="counter-num" id="counter-num">0</div>
          <div class="counter-label">press button to count</div>
        </div>`;

      case "clock2":
        return `<div style="text-align:center;line-height:2.2">
          <div style="color:rgba(255,255,255,0.45);font-size:13px">
            <span style="color:#fff;font-size:16px;margin-right:8px">New York</span>${getTimeOffset(-4)}
          </div>
          <div style="color:rgba(255,255,255,0.45);font-size:13px">
            <span style="color:#fff;font-size:16px;margin-right:8px">London</span>${getTimeOffset(1)}
          </div>
          <div style="color:rgba(255,255,255,0.45);font-size:13px">
            <span style="color:#fff;font-size:16px;margin-right:8px">Tokyo</span>${getTimeOffset(9)}
          </div>
        </div>`;

      case "notes":
        return `<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px">No notes yet</div>`;

      default:
        return `<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px">App not found</div>`;
    }
  }

  function buildAppView(app) {
    const watchView = document.getElementById("view-watch");
    watchView.className = "view active-app-view";
    watchView.innerHTML = `
      <div class="active-icon-large" style="background:${app.color}22;color:${app.color}">${app.emoji}</div>
      <div class="active-app-name">${app.name}</div>
      <div class="active-app-sub">${app.sub}</div>
      <div class="active-app-content">${buildAppContent(app)}</div>
    `;
  }

  function restoreWatchFace() {
    stopTimer();
    const watchView = document.getElementById("view-watch");
    watchView.className = "view watch-bg";
    watchView.innerHTML = `
      <div class="watch-time" id="clock-time">--:--</div>
      <div class="watch-date" id="clock-date">---</div>
      <div class="watch-hint">← dial to browse apps</div>
    `;
    updateClock();
  }

  // ── Timer logic ──────────────────────────────────────────────────
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    timerRunning  = false;
  }

  setInterval(() => {
    if (!timerRunning) return;
    timerSecs = Math.max(0, timerSecs - 1);
    const el  = document.getElementById("timer-disp");
    if (!el) return;
    const mm  = Math.floor(timerSecs / 60).toString().padStart(2, "0");
    const ss  = (timerSecs % 60).toString().padStart(2, "0");
    el.textContent = `${mm}:${ss}`;
    if (timerSecs === 0) timerRunning = false;
  }, 1000);

  // ── Dial input ───────────────────────────────────────────────────
  dial.addEventListener("input", () => {
    const val   = parseInt(dial.value);
    const delta = val - prevDialVal;
    prevDialVal = val;

    if (currentView === "watch") {
      if (val >= DIAL_SWITCH) {
        currentView = "library";
        slideTo(340);
        buildLibList();
        updateBadges();
        dial.value  = DIAL_SWITCH;
        prevDialVal = DIAL_SWITCH;
      }
    } else if (currentView === "app") {
      if (val <= DIAL_SWITCH - 5) {
        currentView = "watch";
        slideTo(0);
        restoreWatchFace();
        updateBadges();
      }
    } else if (currentView === "library") {
      if (val < DIAL_SWITCH - 5) {
        currentView = "watch";
        slideTo(0);
        updateBadges();
        dial.value  = 0;
        prevDialVal = 0;
      } else {
        if (delta > 0 && libIndex < apps.length - 1) { libIndex++; buildLibList(); }
        if (delta < 0 && libIndex > 0)               { libIndex--; buildLibList(); }
      }
    }
  });

  // ── Button input ─────────────────────────────────────────────────
  btnSelect.addEventListener("click", () => {
    if (currentView === "library") {
      selectedApp = apps[libIndex];
      currentView = "app";
      slideTo(0);
      buildAppView(selectedApp);
      updateBadges();
      dial.value  = 0;
      prevDialVal = 0;

    } else if (currentView === "app") {
      // Context-sensitive button behaviour per app
      if (selectedApp.view === "timer") {
        timerRunning = !timerRunning;
        if (!timerRunning && timerSecs === 0) timerSecs = 300;
      } else if (selectedApp.view === "counter") {
        counterVal++;
        const el = document.getElementById("counter-num");
        if (el) el.textContent = counterVal;
      } else {
        // Default: go back to library
        currentView = "library";
        slideTo(340);
        buildLibList();
        updateBadges();
        dial.value  = 50;
        prevDialVal = 50;
      }

    } else if (currentView === "watch") {
      currentView = "library";
      slideTo(340);
      buildLibList();
      updateBadges();
      dial.value  = 50;
      prevDialVal = 50;
    }
  });

  // ── Init ─────────────────────────────────────────────────────────
  updateClock();
  setInterval(updateClock, 10000);
  updateBadges();
</script>
</body>
</html>
